name: Publish to PyPI

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  full-suite:
    name: full suite (ubuntu-latest, 3.12)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -e ".[test]"

      - name: Install MCP Proxy package
        run: python -m pip install -e "packages/agentveil-mcp-proxy[test]"

      - name: Run SDK tests
        run: >-
          python -m pytest -v tests
          --durations=50 --durations-min=1.0
          -o faulthandler_timeout=120

      - name: Run MCP Proxy tests
        run: >-
          python -m pytest -v packages/agentveil-mcp-proxy/tests
          --durations=50 --durations-min=1.0
          -o faulthandler_timeout=120

  compatibility-smoke:
    name: compatibility smoke (${{ matrix.os }}, ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 12
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.10"
          - os: ubuntu-latest
            python-version: "3.11"
          - os: ubuntu-latest
            python-version: "3.13"
          - os: windows-latest
            python-version: "3.12"
          - os: macos-latest
            python-version: "3.12"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: python -m pip install -e ".[test]"

      - name: Install MCP Proxy package
        run: python -m pip install -e "packages/agentveil-mcp-proxy[test]"

      - name: Run bounded compatibility smoke
        run: >-
          python -m pytest -v
          tests/test_mcp_packaging.py
          packages/agentveil-mcp-proxy/tests/test_proxy_packaging.py
          packages/agentveil-mcp-proxy/tests/test_mcp_proxy_platform_contract.py
          packages/agentveil-mcp-proxy/tests/test_mcp_proxy_cursor_setup.py
          packages/agentveil-mcp-proxy/tests/test_mcp_proxy_cursor_hooks.py
          --durations=20 --durations-min=0.5
          -o faulthandler_timeout=60

  approval-center-e2e:
    name: approval center E2E (${{ matrix.os }}, 3.12)
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -e ".[test]"

      - name: Install MCP Proxy package
        run: python -m pip install -e "packages/agentveil-mcp-proxy[test]"

      - name: Run managed Approval Center process E2E
        run: >-
          python -m pytest -v --durations=10
          -o faulthandler_timeout=60
          packages/agentveil-mcp-proxy/tests/test_mcp_proxy_approval_cancellation_managed_e2e.py::test_run_proxy_cancelled_request_shows_terminal_managed_center_page

  publish:
    needs: [full-suite, compatibility-smoke, approval-center-e2e]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build SDK package
        run: python -m build --outdir dist/sdk

      - name: Build MCP Proxy package
        run: python -m build --outdir dist/mcp-proxy packages/agentveil-mcp-proxy

      - name: Check distributions
        run: twine check dist/sdk/* dist/mcp-proxy/*

      - name: Publish SDK to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          packages-dir: dist/sdk
          skip-existing: true

      - name: Publish MCP Proxy to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          packages-dir: dist/mcp-proxy
          skip-existing: true
