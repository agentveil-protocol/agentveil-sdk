name: Tests

on:
  push:
    branches: [main, "codex/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast:
    name: fast tests (ubuntu-latest, 3.12)
    if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -e ".[test]"

      - name: Install MCP Proxy package
        run: python -m pip install -e "packages/agentveil-mcp-proxy[test]"

      - name: Run SDK tests
        run: python -m pytest -v

      - name: Run MCP Proxy tests
        run: python -m pytest -v packages/agentveil-mcp-proxy/tests

  compatibility-pr:
    name: compatibility (${{ matrix.os }}, ${{ matrix.python-version }})
    if: github.event_name == 'pull_request'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.10"
          - os: ubuntu-latest
            python-version: "3.11"
          - os: ubuntu-latest
            python-version: "3.12"
          - os: ubuntu-latest
            python-version: "3.13"
          - os: windows-latest
            python-version: "3.13"
          - os: macos-latest
            python-version: "3.13"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: python -m pip install -e ".[test]"

      - name: Install MCP Proxy package
        run: python -m pip install -e "packages/agentveil-mcp-proxy[test]"

      - name: Run SDK tests
        if: matrix.os == 'ubuntu-latest'
        run: python -m pytest -v

      - name: Run MCP Proxy tests
        if: matrix.os == 'ubuntu-latest'
        run: python -m pytest -v packages/agentveil-mcp-proxy/tests

      - name: Run Cursor hook platform compatibility tests
        if: matrix.os != 'ubuntu-latest'
        run: >-
          python -m pytest -v
          packages/agentveil-mcp-proxy/tests/test_mcp_proxy_platform_contract.py
          packages/agentveil-mcp-proxy/tests/test_mcp_proxy_cursor_setup.py
          packages/agentveil-mcp-proxy/tests/test_mcp_proxy_cursor_hooks.py

  managed-approval-e2e-macos:
    name: managed approval E2E (macos-latest, ${{ matrix.python-version }})
    if: github.event_name == 'pull_request'
    runs-on: macos-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: python -m pip install -e ".[test]"

      - name: Install MCP Proxy package
        run: python -m pip install -e "packages/agentveil-mcp-proxy[test]"

      - name: Run managed Approval Center process E2E
        run: >-
          python -m pytest -v --durations=10
          -o faulthandler_timeout=60
          packages/agentveil-mcp-proxy/tests/test_mcp_proxy_approval_cancellation_managed_e2e.py::test_run_proxy_cancelled_request_shows_terminal_managed_center_page
          packages/agentveil-mcp-proxy/tests/test_mcp_proxy_approval_outcome_truth.py::test_process_e2e_a_timeout_truth
          packages/agentveil-mcp-proxy/tests/test_mcp_proxy_approval_outcome_truth.py::test_process_e2e_b_approve_downstream_success
          packages/agentveil-mcp-proxy/tests/test_mcp_proxy_approval_outcome_truth.py::test_process_e2e_c_approve_downstream_failure
          packages/agentveil-mcp-proxy/tests/test_mcp_proxy_approval_outcome_truth.py::test_process_e2e_d_deny_and_cancel_regression

  windows-symlink-toctou:
    name: Windows symlink TOCTOU (bounded)
    if: github.event_name == 'pull_request'
    runs-on: windows-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python 3.13
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: python -m pip install -e ".[test]"

      - name: Install MCP Proxy package
        run: python -m pip install -e "packages/agentveil-mcp-proxy[test]"

      - name: Run bounded Windows symlink TOCTOU tests
        run: >-
          python -m pytest -q --maxfail=1
          packages/agentveil-mcp-proxy/tests/test_mcp_proxy_symlink_toctou.py
