[project]
name = "agentveil-mcp-proxy"
version = "0.7.34"
description = "Source-available MCP route for approval and local evidence on routed MCP tool calls"
readme = {file = "README.md", content-type = "text/markdown"}
requires-python = ">=3.10"
license = "BUSL-1.1"
license-files = ["LICENSE"]
authors = [{name = "Oleg Boiko", email = "ob@agentveil.dev"}]
maintainers = [{name = "Oleg Boiko", email = "ob@agentveil.dev"}]
keywords = ["ai", "agents", "agent-control", "runtime-gate", "mcp", "mcp-proxy", "approval", "evidence", "routed-actions"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Topic :: Software Development :: Libraries",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]

dependencies = [
    "agentveil>=0.7.21,<0.8",
    "mcp>=1.0.0",
]

[project.urls]
Homepage = "https://agentveil.dev"
Documentation = "https://github.com/agentveil-protocol/agentveil-sdk/tree/main/packages/agentveil-mcp-proxy#readme"
Repository = "https://github.com/agentveil-protocol/agentveil-sdk"
Issues = "https://github.com/agentveil-protocol/agentveil-sdk/issues"

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project.optional-dependencies]
test = ["pytest>=8.0.0", "pytest-asyncio>=0.23.0"]

[project.scripts]
agentveil-mcp-proxy = "agentveil_mcp_proxy.cli:main"

[tool.setuptools.packages.find]
include = ["agentveil_mcp_proxy*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
markers = [
    "allow_approval_browser_delivery: opt out of global browser-delivery block for unit tests with fake runners",
    "allow_demo_managed_approval_center: opt out of global detached approval-center spawn block for isolated demo tests",
]
